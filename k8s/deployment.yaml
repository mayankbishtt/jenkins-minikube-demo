apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask

  template:
    metadata:
      labels:
        app: flask

    spec:
      containers:
      - name: flask
        image: flask-demo:version1
        imagePullPolicy: Never

        ports:
        - containerPort: 5000

        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"